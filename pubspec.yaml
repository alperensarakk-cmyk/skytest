name: aerotest
description: AeroTest – Havacılık İngilizce Sınav Hazırlık Uygulaması
publish_to: 'none'
version: 1.0.4+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  purchases_flutter: ^8.10.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/logo_mark.png"
  adaptive_icon_foreground: "assets/branding/logo_mark.png"
  adaptive_icon_background: "#0B132B"

flutter:
  uses-material-design: true

  assets:
    - assets/sinav_sablonu.json
    - assets/sorular.json
    - assets/kaliplar.json
    - assets/kelimeler.json
    - assets/branding/logo_mark.png
    - assets/branding/logo_full.png
